version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: linux-190-deploy/Dockerfile
    container_name: admin-web-staging
    restart: unless-stopped
    ports:
      - "8108:80"
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  frontend-network:
    driver: bridge
